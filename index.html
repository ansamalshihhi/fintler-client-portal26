<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fintler — Team Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  :root { --fintler: #1B38DB; --fintler-dark: #1530B8; --fintler-light: #E8ECFD; }
  .topnav { border-bottom: 3px solid var(--fintler); }
  .nav-badge-team { font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;background:var(--fintler-light);color:var(--fintler); }
  .team-wrap { display:grid; grid-template-columns:1fr 280px; min-height:calc(100vh - 61px); }
  .team-main { padding:24px; overflow-y:auto; }
  .feed-panel { background:#F7F8FF; border-left:1px solid #E0E4F8; display:flex; flex-direction:column; position:sticky; top:61px; height:calc(100vh - 61px); overflow:hidden; }
  .feed-header { padding:14px 16px; border-bottom:1px solid #E0E4F8; background:white; }
  .feed-title { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--fintler); }
  .feed-scroll { flex:1; overflow-y:auto; padding:12px; }
  .feed-entry { background:white;border:1px solid #E0E4F8;border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid #E0E4F8; }
  .feed-entry.by-admin { border-left-color:var(--fintler); }
  .feed-entry.by-team { border-left-color:#0F7A5A; }
  .feed-entry.by-client { border-left-color:#B5680A; }
  .feed-who { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px; }
  .feed-who.admin { color:var(--fintler); }
  .feed-who.team { color:#0F7A5A; }
  .feed-who.client { color:#B5680A; }
  .feed-action { font-size:12px;color:#2E2D2A;line-height:1.5; }
  .feed-detail { font-size:11px;color:#9E9C98;margin-top:2px; }
  .feed-time { font-size:10px;color:#C0BEB9;font-family:var(--mono);margin-top:4px;display:flex;align-items:center;gap:4px; }
  .feed-empty { text-align:center;padding:30px 16px;color:#C0BEB9;font-size:12px; }
  .status-section { padding:12px; border-bottom:1px solid #E0E4F8; background:white; }
  .status-label { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9E9C98;margin-bottom:7px; }
  .status-chip { display:flex;align-items:center;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:4px;cursor:pointer;border:1px solid transparent;width:100%; }
  .chip-overdue { background:#FDEAEA;color:#B52B2B;border-color:#F5BBBB; }
  .chip-inprog { background:var(--fintler-light);color:var(--fintler);border-color:#C5CCEF; }
  .chip-complete { background:#EAF5EA;color:#237A23;border-color:#B8E0B8; }
  @media(max-width:900px) { .team-wrap{grid-template-columns:1fr} .feed-panel{display:none} }
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" style="width:32px;height:32px;border-radius:6px;flex-shrink:0">
      <rect width="32" height="32" rx="6" fill="#1B38DB"/>
      <rect x="9" y="8" width="14" height="3.5" rx="1" fill="white"/>
      <rect x="9" y="14" width="7" height="3.5" rx="1" fill="white"/>
      <circle cx="20" cy="15.75" r="3" fill="white"/>
      <circle cx="12" cy="22" r="3" fill="white"/>
    </svg>
    <span class="logo-text" style="color:#1B38DB;font-weight:700">Fintler <span style="color:#9E9C98;font-weight:400">/ Team Portal</span></span>
  </div>
  <div class="nav-right">
    <span class="nav-badge-team">Team view</span>
  </div>
</nav>

<div class="toast" id="toast"></div>

<div class="modal-bg hidden" id="item-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add pending document</div>
      <button class="btn-icon" onclick="closeModal('item-modal')">✕</button>
    </div>
    <div class="field"><label>Document name</label><input type="text" id="im-name" placeholder="e.g. Bank statement – March 2025"/></div>
    <div class="field"><label>Format expected</label>
      <select id="im-format">
        <option value="">Any format</option>
        <option>Scanned PDF</option><option>Excel / CSV</option>
        <option>Email / image</option><option>Original hard copy</option>
      </select>
    </div>
    <div class="field"><label>Internal note (optional)</label><textarea id="im-note" placeholder="Instructions for the team..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('item-modal')">Cancel</button>
      <button class="btn btn-primary" style="background:var(--fintler)" onclick="addDocItem()">Add item</button>
    </div>
  </div>
</div>

<div class="team-wrap">
  <div class="team-main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="s-clients">0</div><div class="stat-lbl">Active clients</div></div>
      <div class="stat-card"><div class="stat-num amber" id="s-pending">0</div><div class="stat-lbl">Pending items</div></div>
      <div class="stat-card"><div class="stat-num green" id="s-received">0</div><div class="stat-lbl">Items received</div></div>
      <div class="stat-card"><div class="stat-num red" id="s-overdue">0</div><div class="stat-lbl">Overdue</div></div>
    </div>
    <div class="two-col">
      <div class="sidebar">
        <div class="card" style="padding:14px">
          <div class="card-title" style="margin-bottom:12px">Clients</div>
          <div id="client-list"><div class="empty" style="padding:20px 10px;font-size:12px">Loading...</div></div>
        </div>
      </div>
      <div class="main-col" id="main-detail">
        <div class="empty card" style="padding:60px">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" style="margin:0 auto 12px;display:block;opacity:.25"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>Select a client to view their engagement</p>
        </div>
      </div>
    </div>
  </div>

  <div class="feed-panel">
    <div class="status-section">
      <div class="status-label">Live status</div>
      <div id="status-chips"><span style="font-size:11px;color:#C0BEB9">Loading...</span></div>
    </div>
    <div class="feed-header">
      <div class="feed-title">Activity feed</div>
    </div>
    <div class="feed-scroll" id="feed-scroll">
      <div class="feed-empty">No activity yet.</div>
    </div>
  </div>
</div>

<script src="assets/shared.js"></script>
<script src="assets/team.js"></script>
</body>
</html>
