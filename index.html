<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fintler — Document Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="assets/style.css"/>
</head>
<body>

<nav class="topnav">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#1A5EA8"/><path d="M8 10h10M8 16h7M8 22h9" stroke="white" stroke-width="2.2" stroke-linecap="round"/><circle cx="23" cy="20" r="5" fill="#5DCAA5"/><path d="M21 20l1.5 1.5L25 18.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="logo-text">Fintler <span class="logo-sub">/ Document Portal</span></span>
  </div>
  <div class="nav-right">
    <span class="nav-badge">Fintler team</span>
  </div>
</nav>

<div class="toast" id="toast"></div>

<!-- ADD CLIENT MODAL -->
<div class="modal-bg hidden" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New client engagement</div>
      <button class="btn-icon" onclick="closeModal('add-modal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="field"><label>Client name</label><input type="text" id="m-client" placeholder="e.g. Qtech SPC"/></div>
    <div class="field"><label>Contact email</label><input type="email" id="m-email" placeholder="client@company.com"/></div>
    <div class="field"><label>Period covered</label><input type="text" id="m-period" placeholder="e.g. Q1 2025 / Jan–Mar 2025"/></div>
    <div class="field"><label>Document type</label>
      <div class="type-grid" id="m-type-grid">
        <button class="type-btn" onclick="selType(this,'Bank statement')">Bank statement</button>
        <button class="type-btn" onclick="selType(this,'VAT return')">VAT return</button>
        <button class="type-btn" onclick="selType(this,'Payroll record')">Payroll record</button>
        <button class="type-btn" onclick="selType(this,'Sales invoices')">Sales invoices</button>
        <button class="type-btn" onclick="selType(this,'Purchase invoices')">Purchase invoices</button>
        <button class="type-btn" onclick="selType(this,'Trial balance')">Trial balance</button>
        <button class="type-btn" onclick="selType(this,'Financial statements')">Financial statements</button>
        <button class="type-btn" onclick="selType(this,'Other')">Other</button>
      </div>
    </div>
    <div class="field hidden" id="m-other-row"><label>Specify type</label><input type="text" id="m-other" placeholder="Describe..."/></div>
    <div class="field"><label>Submission deadline</label><input type="date" id="m-deadline"/></div>
    <div class="field">
      <label>Client portal password <span style="color:var(--gray-400);font-weight:400">(client uses this to access their checklist)</span></label>
      <div style="position:relative">
        <input type="text" id="m-password" placeholder="e.g. Qtech2025" style="padding-right:80px"/>
        <button onclick="genPassword()" class="btn btn-ghost btn-xs" style="position:absolute;right:6px;top:50%;transform:translateY(-50%)">Generate</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createClient()">Create engagement</button>
    </div>
  </div>
</div>

<!-- ADD ITEM MODAL -->
<div class="modal-bg hidden" id="item-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add pending document</div>
      <button class="btn-icon" onclick="closeModal('item-modal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="field"><label>Document name</label><input type="text" id="im-name" placeholder="e.g. Bank statement – March 2025"/></div>
    <div class="field"><label>Format expected</label>
      <select id="im-format">
        <option value="">Any format</option>
        <option>Scanned PDF</option><option>Excel / CSV</option>
        <option>Email / image</option><option>Original hard copy</option>
      </select>
    </div>
    <div class="field"><label>Internal note (optional)</label><textarea id="im-note" placeholder="Instructions for the team..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('item-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addDocItem()">Add item</button>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal-bg hidden" id="share-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Share with client</div>
      <button class="btn-icon" onclick="closeModal('share-modal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="share-content"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('share-modal')">Close</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="wrap">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="s-clients">0</div><div class="stat-lbl">Active clients</div></div>
    <div class="stat-card"><div class="stat-num amber" id="s-pending">0</div><div class="stat-lbl">Pending items</div></div>
    <div class="stat-card"><div class="stat-num green" id="s-received">0</div><div class="stat-lbl">Items received</div></div>
    <div class="stat-card"><div class="stat-num red" id="s-overdue">0</div><div class="stat-lbl">Overdue</div></div>
  </div>

  <div class="two-col">
    <div class="sidebar">
      <div class="card" style="padding:14px">
        <div class="flex-between" style="margin-bottom:12px">
          <div class="card-title" style="margin-bottom:0">Clients</div>
          <button class="btn btn-primary btn-sm" onclick="openModal('add-modal')">+ New</button>
        </div>
        <div id="client-list">
          <div class="empty" style="padding:20px 10px;font-size:12px">No clients yet.<br>Click <b>+ New</b> to start.</div>
        </div>
      </div>
    </div>

    <div class="main-col" id="main-detail">
      <div class="empty card" style="padding:60px">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" style="margin:0 auto 12px;display:block;opacity:.25"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>Select a client to view their engagement</p>
      </div>
    </div>
  </div>
</div>

<script src="assets/shared.js"></script>
<script src="assets/portal.js"></script>
</body>
</html>
